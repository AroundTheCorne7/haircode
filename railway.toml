[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @haircode/engine build && pnpm --filter @haircode/db build 2>/dev/null || true && pnpm --filter @haircode/api build"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
