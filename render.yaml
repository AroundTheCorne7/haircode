services:
  - type: web
    name: haircode-api
    runtime: node
    plan: free
    nodeVersion: 20.11.0
    buildCommand: "npm install -g pnpm && pnpm install && pnpm --filter @haircode/engine build && pnpm --filter @haircode/api build"
    startCommand: "node apps/api/dist/index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://haircode.vercel.app
      - key: API_URL
        value: https://haircode-api.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
